---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: volsync-maintenance
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: vault-backend
  target:
    name: volsync-maintenance-secret
  data:
      - secretKey: KOPIA_PASSWORD
        remoteRef:
          key: cephiro/kopia
          property: password
      - secretKey: KOPIA_REPOSITORY
        remoteRef:
          key: cephiro/kopia
          property: repository
