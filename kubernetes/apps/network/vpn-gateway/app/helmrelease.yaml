---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app vpn-gateway
  namespace: network
spec:
  interval: 30m
  chart:
    spec:
      chart: pod-gateway
      version: 7.1.1
      sourceRef:
        kind: HelmRepository
        name: angelnu-charts
        namespace: network

  install:
    remediation:
      retries: 3

  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3

  # See https://github.com/angelnu/helm-charts/blob/main/charts/apps/pod-gateway/values.yaml
  values:
    image:
      repository: ghcr.io/angelnu/pod-gateway
      tag: v1.13.0
      digest: sha256:a5b032e15f7570493977b330a5a86dcffebb807d35685ad803e47afb62d105f2

    settings:
      NOT_ROUTED_TO_GATEWAY_CIDRS: "10.42.0.0/16 10.43.0.0/16 192.168.99.0/24"
      VPN_BLOCK_OTHER_TRAFFIC: true
      VPN_LOCAL_CIDRS: "10.42.0.0/16 10.43.0.0/16 192.168.99.0/24"
      VPN_INTERFACE: wg0
      VXLAN_PORT: 4789

    podAnnotations:
      configmap.reloader.stakater.com/reload: vpn-gateway
      secret.reloader.stakater.com/reload: vpn-gateway

    addons:
      vpn:
        enabled: true
        type: gluetun

        gluetun:
          image:
            repository: ghcr.io/qdm12/gluetun
            tag: v3.41.1
            digest: sha256:1a5bf4b4820a879cdf8d93d7ef0d2d963af56670c9ebff8981860b6804ebc8ab

          env:
            VPN_TYPE: wireguard
            VPN_INTERFACE: wg0
            FIREWALL_ENABLED_DISABLING_IT_SHOOTS_YOU_IN_YOUR_FOOT: off
            DOT: off
            HTTP_CONTROL_SERVER_ADDRESS: ":80"
            HTTP_CONTROL_SERVER_LOG: off
            PUBLICIP_API: ip2location

          envFrom:
            - secretRef:
                name: vpn-gateway-config

          resources:
            requests:
              cpu: 5m
              memory: 64Mi
            limits:
              memory: 128Mi

          securityContext:
            privileged: true
            capabilities:
              add: ["NET_ADMIN"]

          probes:
            liveness:
              enabled: true
              custom: true
              type: custom
              spec:
                exec:
                  command:
                    - sh
                    - -c
                    - COUNTRY=$(curl -s https://ipinfo.io/country); echo $COUNTRY; if [ "$COUNTRY" = "BE" ]; then exit 0; else exit 1; fi
                initialDelaySeconds: 30
                periodSeconds: 60
                failureThreshold: 5
                timeoutSeconds: 5

          persistence:
            config:
              enabled: true
              type: secret
              name: gluetun
              globalMounts:
                - path: /gluetun/auth/config.toml
                  subPath: config.toml
                  readOnly: true

    # all namespaces that will utilize the vpn should be added here
    routed_namespaces: &routedNamespaces
      - downloads

    webhook:
      image:
        repository: ghcr.io/angelnu/gateway-admision-controller
        tag: v3.12.0@sha256:6f6ab596afd5fef0ca4648eadfb21cd37ba86fa5afa8b85edcc072976a61fbed

      namespaceSelector:
        type: custom
        custom:
          matchExpressions:
            - key: kubernetes.io/metadata.name
              operator: In
              values: *routedNamespaces

      # -- boolean: Default behaviour for new PODs in the evaluated namespace
      # if true then the gatewayLabel and gatewayAnnotation below will not be utilized and the
      # gateway will be injected into every pod in the routed_namespaces
      gatewayDefault: false

      # -- boolean: gatewayLabel and gatewayAnnotation controls the label/annotation key of which the value,
      #   by default, must be 'true' on the pod in order for the gateway sidecar to be injected.
      gatewayLabel: use-vpn-gateway

  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Service
              name: *app
            patch: |
              - op: add
                path: /spec/ports/-
                value:
                  name: gluetun
                  port: 80
                  protocol: TCP
                  targetPort: 80
          - target:
              kind: Deployment
              name: *app
            patch: |
              - op: add
                path: /spec/template/spec/containers/1/ports
                value: []
          - target:
              kind: Deployment
              name: *app
            patch: |
              - op: add
                path: /spec/template/spec/containers/1/ports/-
                value:
                  containerPort: 80
                  name: gluetun
                  protocol: TCP
