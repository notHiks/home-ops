apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: vpn-gateway
  namespace: network
spec:
  interval: 30m
  chart:
    spec:
      chart: pod-gateway
      version: 7.1.1
      sourceRef:
        kind: HelmRepository
        name: angelnu-charts
        namespace: network
  timeout: 20m
  install:
    remediation:
      retries: 3
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3

  values:
    # VPN service configuration
    service:
      vpn:
        enabled: true
        type: LoadBalancer
        controller: main
        ports:
          gluetun:
            enabled: true
            port: 80
        containers:
          gluetun:
            enabled: true
            image:
              repository: ghcr.io/qdm12/gluetun
              tag: v3.41.1@sha256:1a5bf4b4820a879cdf8d93d7ef0d2d963af56670c9ebff8981860b6804ebc8ab
            env:
              - name: VPN_TYPE
                value: wireguard
              - name: VPN_INTERFACE
                value: wg0
            envFrom:
              - secretRef:
                  name: vpn-gateway-config
            securityContext:
              privileged: true
              capabilities:
                add:
                  - NET_ADMIN
            probes:
              liveness:
                enabled: true
                custom: true
                type: custom
                spec:
                  exec:
                    command:
                      - sh
                      - -c
                      - |
                        COUNTRY=$(wget -q -O- https://ipinfo.io/country)
                        echo $COUNTRY
                        if [ "$COUNTRY" == "BE" ]; then exit 0; else exit 1; fi
                  initialDelaySeconds: 30
                  periodSeconds: 60
                  failureThreshold: 5
                  timeoutSeconds: 5

    # Routing configuration
    routed_namespaces:
      - downloads

    # Pod-gateway VPN settings
    settings:
      VPN_INTERFACE: wg0
      VPN_BLOCK_OTHER_TRAFFIC: true
      VPN_LOCAL_CIDRS: "10.42.0.0/16 10.43.0.0/16 192.168.99.0/24"
      NOT_ROUTED_TO_GATEWAY_CIDRS: "10.42.0.0/16 10.43.0.0/16 192.168.99.0/24"
      VXLAN_PORT: 4789

    # Pod annotations for secret/config reload
    podAnnotations:
      configmap.reloader.stakater.com/reload: vpn-gateway
      secret.reloader.stakater.com/reload: vpn-gateway-config

    # Webhook configuration for sidecar injection
    webhook:
      image:
        repository: ghcr.io/angelnu/gateway-admision-controller
        tag: v3.12.0@sha256:6f6ab596afd5fef0ca4648eadfb21cd37ba86fa5afa8b85edcc072976a61fbed
      namespaceSelector:
        type: custom
        custom:
          matchExpressions:
            - key: kubernetes.io/metadata.name
              operator: In
              values:
                - downloads
      gatewayDefault: false
      gatewayLabel: use-vpn-gateway

  # Post-render patches for ports
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Service
              name: vpn-gateway
            patch: |
              - op: add
                path: /spec/ports/-
                value:
                  name: gluetun
                  port: 80
                  protocol: TCP
                  targetPort: 80
          - target:
              kind: Deployment
              name: vpn-gateway
            patch: |
              - op: add
                path: /spec/template/spec/containers/1/ports
                value: []
          - target:
              kind: Deployment
              name: vpn-gateway
            patch: |
              - op: add
                path: /spec/template/spec/containers/1/ports/-
                value:
                  containerPort: 80
                  name: gluetun
                  protocol: TCP