---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: vpn-gateway
  labels:
    app: vpn-gateway
spec:
  selector:
    matchLabels:
      app: vpn-gateway
  template:
    metadata:
      labels:
        app: vpn-gateway
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        kubernetes.io/hostname: fuu-01

      containers:
          app:
            image:
              repository: ghcr.io/qdm12/gluetun
              tag: v3.41.1
              digest: sha256:1a5bf4b4820a879cdf8d93d7ef0d2d963af56670c9ebff8981860b6804ebc8ab

            securityContext:
              privileged: true  # Required for WireGuard tunnel creation
              capabilities:
                add: ["NET_ADMIN"]

            env:
              VPN_TYPE: wireguard
              VPN_INTERFACE: wg0
              DOT: off
              DNS_KEEP_NAMESERVERS: "true"
              FIREWALL_INPUT_PORTS: "8000"  # Expose control port for health checks
              HTTP_CONTROL_SERVER_ADDRESS: ":8000"
              HTTP_CONTROL_SERVER_LOG: on
              PUBLICIP_API: ip2location
              UPDATER_PERIOD: 12h
              LOG_LEVEL: info

            envFrom:
              - secretRef:
                  name: vpn-gateway-config
              - secretRef:
                  name: gluetun-auth

            volumeMounts:
              - name: gluetun-config
                mountPath: /gluetun/auth/config.toml
                subPath: config.toml
                readOnly: true

            resources:
              requests:
                cpu: 5m
                memory: 64Mi
              limits:
                memory: 128Mi

            ports:
              - containerPort: 8000
                name: control
                protocol: TCP

            readinessProbe:
              httpGet:
                path: /v1/publicip/ip
                port: 8000
                httpHeaders:
                  - name: X-API-Key
                    value: "$(API_KEY)"
              initialDelaySeconds: 30
              periodSeconds: 30
              failureThreshold: 3
              timeoutSeconds: 5

            livenessProbe:
              httpGet:
                path: /v1/publicip/ip
                port: 8000
                httpHeaders:
                  - name: X-API-Key
                    value: "$(API_KEY)"
              initialDelaySeconds: 60
              periodSeconds: 60
              failureThreshold: 5
              timeoutSeconds: 10

