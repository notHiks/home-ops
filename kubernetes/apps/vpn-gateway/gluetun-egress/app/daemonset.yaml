---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: vpn-gateway
  labels:
    app: vpn-gateway
spec:
  selector:
    matchLabels:
      app: vpn-gateway
  template:
    metadata:
      labels:
        app: vpn-gateway
    spec:
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      nodeSelector:
        kubernetes.io/hostname: fuu-01

      containers:
          app:
            image:
              repository: ghcr.io/qdm12/gluetun
              tag: v3.41.1
              digest: sha256:1a5bf4b4820a879cdf8d93d7ef0d2d963af56670c9ebff8981860b6804ebc8ab

            securityContext:
              privileged: true  # Required for WireGuard tunnel creation
              capabilities:
                add: ["NET_ADMIN"]

            resources:
              limits:
                memory: 128Mi
                squat.ai/tun: "1"     # ← your device plugin resource
              requests:
                cpu: 5m
                memory: 64Mi

            env:
              - name: VPN_TYPE
                value: wireguard
              - name: VPN_INTERFACE
                value: wg0
              - name: DOT
                value: "off"
              - name: DNS_KEEP_NAMESERVERS
                value: "true"
              - name: FIREWALL_INPUT_PORTS
                value: "8000"
              - name: HTTP_CONTROL_SERVER_ADDRESS
                value: ":8000"
              - name: HTTP_CONTROL_SERVER_LOG
                value: "on"
              - name: PUBLICIP_API
                value: ip2location
              - name: UPDATER_PERIOD
                value: "12h"
              - name: LOG_LEVEL
                value: info

            envFrom:
              - secretRef:
                  name: vpn-gateway-config
              - secretRef:
                  name: gluetun-auth

            volumeMounts:
              - name: gluetun-config
                mountPath: /gluetun/auth/config.toml
                subPath: config.toml
                readOnly: true

            ports:
              - containerPort: 8000
                name: control
                protocol: TCP

            readinessProbe:
              httpGet:
                path: /v1/publicip/ip
                port: 8000
                httpHeaders:
                  - name: X-API-Key
                    value: "$(API_KEY)"
              initialDelaySeconds: 30
              periodSeconds: 30
              failureThreshold: 3
              timeoutSeconds: 5

            livenessProbe:
              httpGet:
                path: /v1/publicip/ip
                port: 8000
                httpHeaders:
                  - name: X-API-Key
                    value: "$(API_KEY)"
              initialDelaySeconds: 60
              periodSeconds: 60
              failureThreshold: 5
              timeoutSeconds: 10

