apiVersion: v1
kind: ConfigMap
metadata:
  name: gluetun-nat-script
  namespace: vpn-gateway
data:
  setup-nat.sh: |
    #!/bin/sh
    echo "[gluetun-nat] Starting NAT setup for wg0"

    # Wait for wg0 interface
    for i in $(seq 1 30); do
      if ip link show wg0 >/dev/null 2>&1; then
        echo "[gluetun-nat] wg0 interface detected"
        break
      fi
      echo "[gluetun-nat] Waiting for wg0... ($i/30)"
      sleep 2
    done

    echo "[gluetun-nat] Adding MASQUERADE rule for all traffic leaving wg0"
    # Broader rule - catch all traffic going out via wg0 (not just 10.42.0.0/16)
    iptables -t nat -C POSTROUTING -o wg0 -j MASQUERADE 2>/dev/null || \
      iptables -t nat -A POSTROUTING -o wg0 -j MASQUERADE

    # Forwarding rules
    iptables -C FORWARD -i wg0 -j ACCEPT 2>/dev/null || \
      iptables -A FORWARD -i wg0 -j ACCEPT
    iptables -C FORWARD -o wg0 -j ACCEPT 2>/dev/null || \
      iptables -A FORWARD -o wg0 -j ACCEPT

    # Allow established/related connections back in
    iptables -C FORWARD -i wg0 -o eth0 -m state --state RELATED,ESTABLISHED -j ACCEPT 2>/dev/null || \
      iptables -A FORWARD -i wg0 -o eth0 -m state --state RELATED,ESTABLISHED -j ACCEPT

    echo "[gluetun-nat] NAT and forwarding rules applied successfully"

  cleanup-nat.sh: |
    #!/bin/sh
    echo "[gluetun-nat] Cleaning up NAT rules"
    iptables -t nat -D POSTROUTING -o wg0 -j MASQUERADE 2>/dev/null || true
    iptables -D FORWARD -i wg0 -j ACCEPT 2>/dev/null || true
    iptables -D FORWARD -o wg0 -j ACCEPT 2>/dev/null || true
    iptables -D FORWARD -i wg0 -o eth0 -m state --state RELATED,ESTABLISHED -j ACCEPT 2>/dev/null || true
    echo "[gluetun-nat] Cleanup complete"