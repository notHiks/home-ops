apiVersion: v1
kind: ConfigMap
metadata:
  name: gluetun-nat-script
  namespace: vpn-gateway
data:
  setup-nat.sh: |
    #!/bin/sh
    echo "[gluetun-nat] Starting NAT setup"

    for i in $(seq 1 30); do
      if ip link show wg0 >/dev/null 2>&1; then
        echo "[gluetun-nat] wg0 detected"
        break
      fi
      echo "[gluetun-nat] Waiting for wg0..."
      sleep 1
    done

    echo "[gluetun-nat] Adding MASQUERADE rule"
    iptables -t nat -C POSTROUTING -s 10.42.0.0/16 -o wg0 -j MASQUERADE 2>/dev/null || iptables -t nat -A POSTROUTING -s 10.42.0.0/16 -o wg0 -j MASQUERADE
    iptables -C FORWARD -i wg0 -o eth0 -m state --state RELATED,ESTABLISHED -j ACCEPT 2>/dev/null || iptables -A FORWARD -i wg0 -o eth0 -m state --state RELATED,ESTABLISHED -j ACCEPT
    iptables -C FORWARD -i eth0 -o wg0 -j ACCEPT 2>/dev/null || iptables -A FORWARD -i eth0 -o wg0 -j ACCEPT
    echo "[gluetun-nat] NAT setup complete"

  cleanup-nat.sh: |
    #!/bin/sh
    echo "[gluetun-nat] Cleaning up NAT rules"
    iptables -t nat -D POSTROUTING -s 10.42.0.0/16 -o wg0 -j MASQUERADE 2>/dev/null || true
    iptables -D FORWARD -i wg0 -o eth0 -m state --state RELATED,ESTABLISHED -j ACCEPT 2>/dev/null || true
    iptables -D FORWARD -i eth0 -o wg0 -j ACCEPT 2>/dev/null || true
    echo "[gluetun-nat] Cleanup complete"