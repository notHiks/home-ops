---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# This policy allows the vpn-gateway to go out to the internet on port 51820 and also to talk to any cluster entities
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: vpn-gateway-egress
  namespace: vpn-gateway
spec:
  endpointSelector:
    matchLabels:
      app: gluetun-egress
  egress:
    # WireGuard handshake
    - toCIDRSet:
        - cidr: "0.0.0.0/0"
      toPorts:
        - ports:
            - port: "51820"
              protocol: UDP

    # Critical: Allow DNS resolution (UDP 53 + TCP 53 + DoT + DoH)
    - toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
            - port: "853"
              protocol: TCP
            - port: "443"
              protocol: TCP
      toEntities:
        - world

    # 3. Allow general outbound after tunnel is up
    - toEntities:
        - world

    # 4. Allow internal cluster communication
    - toEntities:
        - cluster
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: vpn-l3-redirect
  namespace: vpn-gateway
spec:
  endpointSelector:
    matchLabels:
      use-vpn: "true"
  egressRedirect:
    service:
      name: vpn-gateway
      namespace: vpn-gateway
    redirectPort: 0
---
# This policy allows inbound connections to the vpn-gateway on port 8000 to gluetun http_control_server
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: vpn-gateway-control-server
  namespace: vpn-gateway
spec:
  endpointSelector:
    matchLabels:
      app: gluetun-egress
  ingress:
    - fromEntities:
        - cluster
      toPorts:
        - ports:
            - port: "8000"
              protocol: TCP