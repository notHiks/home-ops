apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name:  vpn-gateway
spec:
  interval: 30m
  chart:
    spec:
      chart: pod-gateway
      version: 7.1.1
      sourceRef:
        kind: HelmRepository
        name: angelnu-charts
  timeout: 20m
  install:
    remediation:
      retries: -1
  upgrade:
    cleanupOnFail: true
    remediation:
      strategy: rollback
      retries: 3

  values:
    # ==================== Main VPN Gateway Controller ====================
    controllers:
      main:
        enabled: true
        serviceAccount:
          identifier: default

        containers:
          main:
            image:
              repository: ghcr.io/angelnu/pod-gateway
              tag: v1.13.0@sha256:a5b032e15f7570493977b330a5a86dcffebb807d35685ad803e47afb62d105f2
          gluetun:
            enabled: true
            type: gluetun
            gluetun:
              image:
                repository: ghcr.io/qdm12/gluetun
                tag: v3.41.1@sha256:1a5bf4b4820a879cdf8d93d7ef0d2d963af56670c9ebff8981860b6804ebc8ab

            env:
             - name: VPN_TYPE
               value: wireguard
             - name: VPN_INTERFACE
               value: wg0
             - name: DOT
               value: "off"
             - name: VPN_ENDPOINT_IP_VERSION
               value: "v4"       # Forces Gluetun to pick an IPv4 address for the VPN server
             - name: IPV6
               value: "off"
             - name: DOT_IPV6
               value: "off"      # Disables IPv6 for the internal DNS over TLS (Unbound)

            envFrom:
              - secretRef:
                  name: vpn-gateway-config

            securityContext:
              privileged: true
              capabilities:
                add:
                  - NET_ADMIN
            resources:
              requests:
                cpu: 100m
                memory: 64Mi
              limits:
                cpu: 175m
                memory: 192Mi
                squat.ai/tun: "1"

            probes:
              liveness:
                enabled: true
                custom: true
                type: custom
                spec:
                  exec:
                    command:
                      - sh
                      - -c
                      - 'wget -qO- http://localhost:80/v1/version || exit 1'
                  initialDelaySeconds: 30
                  periodSeconds: 20
                  failureThreshold: 5
                  timeoutSeconds: 5

            readiness:
              enabled: true
              custom: true
              type: custom
              spec:
                exec:
                  command:
                    - sh
                    - -c
                    - >
                      wget -qO- http://localhost:80/v1/wireguard/status |
                      grep -q '"connected":true' || exit 1;
                      COUNTRY=$(wget -qO- http://localhost:80/v1/publicip/country);
                      echo "Exit country: $COUNTRY";
                      if [ "$COUNTRY" = "SE" ]; then exit 0; else exit 1; fi
                initialDelaySeconds: 40
                periodSeconds: 30
                failureThreshold: 3
                timeoutSeconds: 5

        # no probes on main container
        probes: {}

        persistence:
          config:
            enabled: true
            type: secret
            name: gluetun
            globalMounts:
              - path: /gluetun/auth/config.toml
                subPath: config.toml
                readOnly: true

        pod:
          annotations:
            configmap.reloader.stakater.com/reload: vpn-gateway
            secret.reloader.stakater.com/reload: vpn-gateway

      # ==================== Admission Webhook Controller ====================
      webhook:
        serviceAccount:
          identifier: default
        pod:
          # DNS config for webhook pod + injected sidecars
          dnsConfig:
            options:
              - name: ndots
                value: '1'
        containers:
          main:
            image:
              repository: ghcr.io/angelnu/gateway-admision-controller
              tag: v3.12.0@sha256:6f6ab596afd5fef0ca4648eadfb21cd37ba86fa5afa8b85edcc072976a61fbed

    # Global default service account (used by both main and webhook controllers)
    serviceAccount:
      default:
        enabled: true

    # Disable built-in Kubernetes NetworkPolicy (we use CiliumNetworkPolicy instead)
    networkpolicies:
      main:
        enabled: false

    # ==================== VPN Routing / Sidecar Injection Settings ====================
    routed_namespaces:
      - downloads

    # Inject VPN sidecar into ALL pods in the routed_namespaces. (true by default)
    gatewayDefault: false

    # No longer needed when gatewayDefault = true
    gatewayAnnotation: setGateway

    settings:
      # -- If using a VPN, interface name created by it
      VPN_INTERFACE: wg0
      # -- Prevent non VPN traffic to leave the gateway
      VPN_BLOCK_OTHER_TRAFFIC: true
      # -- If VPN_BLOCK_OTHER_TRAFFIC is true, allow VPN traffic over this port
      VPN_TRAFFIC_PORT: 51820
      # Traffic to these CIDRs will bypass the VPN (local + cluster internal)
      VPN_LOCAL_CIDRS: "10.42.0.0/16 10.43.0.0/16 172.16.0.0/12 192.168.99.0/24"
      # Traffic from routed pods to these CIDRs will NOT go through the gateway
      NOT_ROUTED_TO_GATEWAY_CIDRS: "10.42.0.0/16 10.43.0.0/16 172.16.0.0/12 192.168.99.0/24"

  # Post-renderers to expose Gluetun HTTP dashboard on port 80
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: Service
              name: vpn-gateway
            patch: |
              - op: add
                path: /spec/ports/-
                value:
                  name: gluetun-dashboard
                  port: 80
                  protocol: TCP
                  targetPort: 80

          - target:
              kind: Deployment
              name: vpn-gateway
            patch: |
              - op: add
                path: /spec/template/spec/containers/1/ports
                value:
                  - containerPort: 80
                    name: gluetun-dashboard
                    protocol: TCP

          - target:
              kind: Deployment
              name: vpn-gateway
            patch: |
              - op: add
                path: /spec/strategy
                value:
                  type: Recreate

          # IPv6 rule cleanup on start (defensive, though IPV6 is off)
          - target:
              kind: Deployment
              name: vpn-gateway
            patch: |
              - op: add
                path: /spec/template/spec/containers/1/lifecycle
                value:
                  postStart:
                    exec:
                      command:
                        - /bin/sh
                        - -c
                        - "(ip rule del table 51820; ip -6 rule del table 51820) || true"
