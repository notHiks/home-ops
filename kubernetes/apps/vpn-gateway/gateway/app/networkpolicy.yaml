---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# This policy allows the vpn-gateway to go out to the internet on port 51820 and also to talk to any cluster entities
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: vpn-gateway
  labels:
    app.kubernetes.io/instance: &instance vpn-gateway
    app.kubernetes.io/name: &name pod-gateway
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/instance: *instance
      app.kubernetes.io/name: *name
  egress:
    # Allow WireGuard VPN traffic to the internet
    - toCIDR:
        - 0.0.0.0/0
      toPorts:
        - ports:
            - port: "51820"
              protocol: UDP
    - toEntities:
        - cluster
        - host
---
# This policy allows the vpn-gateway to communicate over the default VXLAN port
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: vpn-gateway-vxlan
  labels:
    app.kubernetes.io/instance: vpn-gateway
    app.kubernetes.io/name: pod-gateway
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/instance: vpn-gateway
      app.kubernetes.io/name: pod-gateway

  egress:
    # Allow VXLAN traffic to the gateway pod(s)
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/instance: vpn-gateway
            app.kubernetes.io/name: pod-gateway
      toPorts:
        - ports:
            - port: "4789"
              protocol: UDP
    # Allow DHCP broadcast from VXLAN interface
    - toCIDR:
        - 255.255.255.255/32
      toPorts:
        - ports:
            - port: "67"
              protocol: UDP
            - port: "68"
              protocol: UDP
    # Allow VXLAN subnet traffic itself
    - toCIDR:
        - 172.16.0.0/24
      toPorts:
        - ports:
            - port: "4789"
              protocol: UDP

  ingress:
    # Allow VXLAN traffic only from other gateway pods
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/instance: vpn-gateway
            app.kubernetes.io/name: pod-gateway
      toPorts:
        - ports:
            - port: "4789"
              protocol: UDP
    # Allow DHCP replies from DHCP servers in the cluster (UDP 67/68)
    - fromEntities: ["cluster"]
      toPorts:
        - ports:
            - port: "67"
              protocol: UDP
            - port: "68"
              protocol: UDP
    # Allow ICMP for heartbeat checks
    - icmps:
        - fields:
            - type: 8   # Echo request
              family: IPv4
---
# Admission webhook traffic (K8s API server -> pod-gateway)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: pod-gateway-webhook
  labels:
    app.kubernetes.io/instance: &instance vpn-gateway
    app.kubernetes.io/name: &name pod-gateway
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/instance: *instance
      app.kubernetes.io/name: *name
  ingress:
    - toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
---
# This policy allows inbound connections to the vpn-gateway on port 80 to gluetun http_control_server
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: vpn-gateway-http-control
  labels:
    app.kubernetes.io/instance: &instance vpn-gateway
    app.kubernetes.io/name: &name pod-gateway
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/instance: *instance
      app.kubernetes.io/name: *name
  ingress:
    - toPorts:
        - ports:
            - port: "80"
              protocol: TCP