---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# This policy allows the vpn-gateway to go out to the internet on port 51820 and also to talk to any cluster entities
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: vpn-gateway
  labels:
    app.kubernetes.io/instance: &instance vpn-gateway
    app.kubernetes.io/name: &name pod-gateway
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/instance: *instance
      app.kubernetes.io/name: *name

  egress:
    - toCIDR:
        - 0.0.0.0/0
      toPorts:
        - ports:
            - port: "51820"
              protocol: UDP
    - toEntities:
        - cluster
        - remote-node
        - host

  ingress:
    # Allow everything (broad)
    - fromEntities:
        - cluster
        - remote-node
        - host

    # VXLAN on new port
    - fromEntities:
        - cluster
        - remote-node
        - host
      toPorts:
        - ports:
            - port: "4789"
              protocol: UDP

---
# Admission webhook traffic (K8s API server -> pod-gateway)
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: pod-gateway-webhook
  labels:
    app.kubernetes.io/instance: &instance vpn-gateway
    app.kubernetes.io/name: &name pod-gateway
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/instance: *instance
      app.kubernetes.io/name: *name
  ingress:
    - toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
---
# This policy allows inbound connections to the vpn-gateway on port 80 to gluetun http_control_server
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: vpn-gateway-http-control
  labels:
    app.kubernetes.io/instance: &instance vpn-gateway
    app.kubernetes.io/name: &name pod-gateway
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/instance: *instance
      app.kubernetes.io/name: *name
  ingress:
    - toPorts:
        - ports:
            - port: "80"
              protocol: TCP
---
# clusterwide vxlan and dhcp policy for the vpn-gateway, since it needs to talk to other nodes and the cluster network
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-pod-gateway-vxlan
spec:
  nodeSelector: {}
  ingress:
    - fromEntities:
        - remote-node
        - host
      toPorts:
        - ports:
            - port: "4789"
              protocol: UDP
    - fromEntities:
        - remote-node
        - host
      toPorts:
        - ports:
            - port: "67"
              protocol: UDP
            - port: "68"
              protocol: UDP