---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: &app suwayomi
spec:
  chartRef:
    kind: OCIRepository
    name: suwayomi
  interval: 1h

  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 5
    timeout: 20m

  values:
    controllers:
      suwayomi:
        type: deployment
        strategy: Recreate

        pod:
          nodeSelector:
            kubernetes.io/hostname: fuu-01

          labels:
            app.kubernetes.io/name: *app
            use-vpn-gateway: "true"

          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch

        # Init container to wait for Piraeus NFS export
        initContainers:
          wait-nfs:
            image:
              repository: busybox
              tag: "1.36"
            resources:
              requests:
                cpu: 10m
                memory: 10Mi
              limits:
                cpu: 50m
                memory: 50Mi
            command:
              - sh
              - -c
              - |
                echo "Waiting 90 seconds for Piraeus NFS export..."
                sleep 90
                echo "NFS wait completed."

        containers:
          app:
            image:
              repository: ghcr.io/suwayomi/tachidesk
              tag: v2.1.2087@sha256:de77d00edd3df9d064151b7ff0302805f744f66ec9147c3f0552ee7012712ba4
            env:
              TZ: Europe/Paris
              BIND_PORT: &port 4567
              WEB_UI_CHANNEL: "preview"
              AUTO_DOWNLOAD_CHAPTERS: true
              UPDATE_EXCLUDE_UNREAD: "false"
              UPDATE_EXCLUDE_STARTED: "false"
              UPDATE_EXCLUDE_COMPLETED: "false"
              DOWNLOAD_AS_CBZ: "true"
              EXTENSION_REPOS: '["https://raw.githubusercontent.com/keiyoushi/extensions/repo/index.min.json"]'
            envFrom:
              - secretRef:
                  name: suwayomi-config
            resources:
              requests:
                memory: 250Mi
                cpu: 500m
              limits:
                memory: 1500Mi

            probes:
              # Readiness: App is ready to serve traffic
              readiness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v1/ping
                    port: 4567
                  initialDelaySeconds: 30
                  periodSeconds: 30
                  failureThreshold: 5

              # Liveness: App is still alive
              liveness:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v1/ping
                    port: 4567
                  initialDelaySeconds: 60
                  periodSeconds: 60
                  failureThreshold: 8

              # Startup: Give time for database + NFS mount
              startup:
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /api/v1/ping
                    port: 4567
                  initialDelaySeconds: 45
                  periodSeconds: 10
                  failureThreshold: 60   # ~10 minutes total
    service:
      app:
        controller: suwayomi
        ports:
          http:
            port: *port
            protocol: TCP

    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Books
          gethomepage.dev/name: Suwayomi
          gethomepage.dev/icon: https://raw.githubusercontent.com/Suwayomi/Suwayomi-Server/master/server/src/main/resources/icon/faviconlogo.png
          gethomepage.dev/description: Manga Web Reader/Downloader
        hostnames: ["{{ .Release.Name }}.${SECRET_DOMAIN}"]
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - port: *port
                name: *app

    persistence:
      config:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: *app
        globalMounts:
          - path: /home/suwayomi/.local/share/Tachidesk

      nfs-data:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: nfs-pictures
        globalMounts:
          - path: /home/suwayomi/.local/share/Tachidesk/downloads
            subPath: downloads
          - path: /home/suwayomi/.local/share/Tachidesk/local
            subPath: local

      tmpfs:
        enabled: true
        type: emptyDir