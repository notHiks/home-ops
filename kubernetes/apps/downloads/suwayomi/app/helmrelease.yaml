---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: suwayomi
spec:
  chartRef:
    kind: OCIRepository
    name: suwayomi
  interval: 1h

  install:
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 5
    timeout: 20m

  values:
    controllers:
      suwayomi:
        strategy: RollingUpdate

        pod:
          annotations:
            setGateway: "true"
          nodeSelector:
            kubernetes.io/hostname: fuu-01

          labels:
            app.kubernetes.io/name: suwayomi

          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch

        # Init container to wait for Piraeus NFS export
        initContainers:
          wait-nfs:
            image:
              repository: busybox
              tag: "1.37"
            resources:
              requests:
                cpu: 10m
                memory: 10Mi
              limits:
                cpu: 50m
                memory: 50Mi
            command:
              - sh
              - -c
              - |
                echo "Waiting 90 seconds for Piraeus NFS export..."
                sleep 90
                echo "NFS wait completed."

        containers:
          app:
            image:
              repository: ghcr.io/suwayomi/suwayomi-server
              tag: v2.1.2087@sha256:bc7164c81b810dfc2804b26243aa768ff0746348675988532dfb734f15350713
            env:
              BIND_PORT: &port 4567
              WEB_UI_CHANNEL: "preview"
            envFrom:
              - secretRef:
                  name: suwayomi-config
            resources:
              requests:
                memory: 2Gi
                cpu: 500m
              limits:
                memory: 4Gi
                cpu: 1

          # Image Converter
          suwayomi-converter:
            image:
              repository: ghcr.io/suwayomi/suwayomi-converter
              tag: r10@sha256:6f200b3051daa5bac83cc723130fdb4a1fb440f88568aeb2fd78b340381ce8c5
            envFrom:
              - secretRef:
                  name: suwayomi-image
            ports:
              - containerPort: 5678

          #  probes:
          #    # Readiness: App is ready to serve traffic
          #    readiness:
          #      enabled: true
          #      custom: true
          #      spec:
          #        httpGet:
          #          path: /api/v1/ping
          #          port: 4567
          #        initialDelaySeconds: 30
          #        periodSeconds: 30
          #        failureThreshold: 5

              # Liveness: App is still alive
           #   liveness:
           #     enabled: true
           #     custom: true
           #     spec:
           #       httpGet:
           #         path: /api/v1/ping
           #         port: 4567
           #       initialDelaySeconds: 60
           #       periodSeconds: 60
           #       failureThreshold: 8

              # Startup: Give time for database + NFS mount
             # startup:
             #   enabled: true
             #   custom: true
             #   spec:
             #     httpGet:
             #       path: /api/v1/ping
             #       port: 4567
             #     initialDelaySeconds: 45
             #     periodSeconds: 10
             #     failureThreshold: 60   # ~10 minutes total
    service:
      app:
        controller: suwayomi
        type: LoadBalancer
        annotations:
          lbipam.cilium.io/ips: 192.168.99.65
          externalTrafficPolicy: Local
        ports:
          http:
            port: *port
            protocol: TCP

    route:
      app:
        annotations:
          gethomepage.dev/enabled: "true"
          gethomepage.dev/group: Books
          gethomepage.dev/name: Suwayomi
          gethomepage.dev/icon: https://raw.githubusercontent.com/Suwayomi/Suwayomi-Server/master/server/src/main/resources/icon/faviconlogo.png
          gethomepage.dev/description: Manga Web Reader/Downloader
        hostnames:
          - "{{ .Release.Name }}.musai.ovh"
        parentRefs:
          - name: envoy-internal
            namespace: network
            sectionName: https
        rules:
          - backendRefs:
              - port: *port
                name: suwayomi

    persistence:
      config:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: ${APP_NAME}
        globalMounts:
          - path: /home/suwayomi/.local/share/Tachidesk

      nfs-data:
        enabled: true
        type: persistentVolumeClaim
        existingClaim: nfs-pictures
        globalMounts:
          - path: /home/suwayomi/.local/share/Tachidesk/downloads
            subPath: downloads
          - path: /home/suwayomi/.local/share/Tachidesk/local
            subPath: local
          - path: /home/suwayomi/.local/share/Tachidesk/backups
            subPath: backups

      tmpfs:
        enabled: true
        type: emptyDir