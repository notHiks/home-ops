---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: suwayomi
  namespace: downloads
spec:
  components:
    - ../../../../components/nfs-scaler
    - ../../../../components/volsync
  dependsOn:
    - name: linstor
      namespace: flux-system
  targetNamespace: downloads
  commonMetadata:
    labels:
      app.kubernetes.io/name: suwayomi
  path: ./kubernetes/apps/downloads/suwayomi/app
  postBuild:
    substitute:
      APP_NAME: suwayomi
      VOLSYNC_CAPACITY: 50Gi
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  interval: 30m
  timeout: 3m
