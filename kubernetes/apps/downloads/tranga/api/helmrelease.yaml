# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: tranga-api
spec:
  chartRef:
    kind: OCIRepository
    name: tranga-api
  interval: 15m
  values:
    controllers:
      tranga-api:

        pod:
          annotations:
            setGateway: "true"
          securityContext:
            fsGroup: 1000
            fsGroupChangePolicy: OnRootMismatch

        containers:
          app:
            image:
              repository: glax/tranga-api
              tag: latest
            ports:
              - name: api
                containerPort: 6531
            resources:
              requests:
                cpu: 200m
                memory: 512Mi
              limits:
                cpu: 500m
                memory: 1Gi

            envFrom:
              - secretRef:
                  name: database-credentials

    persistence:
      tranga-data:
         enabled: true
         type: persistentVolumeClaim
         existingClaim: nfs-manga
         globalMounts:
           - path: /Manga
             subPath: manga
           - path: /usr/share/tranga-api
             subPath: tranga-api

    service:
      tranga-api:
        controller: tranga-api
        ports:
          http:
            port: 6531
