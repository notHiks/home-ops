---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/cilium.io/ciliumnetworkpolicy_v2.json
# This policy is to allow inbound SMB traffic to the Samba pod
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: samba-ingress
  labels:
    app.kubernetes.io/instance: &instance samba
    app.kubernetes.io/name: &name samba
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/instance: *instance
      app.kubernetes.io/name: *name
  ingress:
    - fromEntities:
        - cluster
      toPorts:
        - ports:
            - port: "445"
              protocol: TCP
            - port: "445"
              protocol: UDP
            - port: "3702"
              protocol: TCP
            - port: "3702"
              protocol: UDP
            - port: "5355"
              protocol: UDP
    # Allow ICMP echo
    - icmps:
        - fields:
            - type: 8
              family: IPv4
    # Allow traffic from Windows PC
    - fromCIDR:
        - 192.168.88.0/24
      toPorts:
        - ports:
            - port: "445"
              protocol: TCP
            - port: "445"
              protocol: UDP
            - port: "3702"
              protocol: TCP
            - port: "3702"
              protocol: UDP
            - port: "5355"
              protocol: UDP
  egress:
    # Allow DNS queries to CoreDNS
    - toEntities:
        - cluster
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
---
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: samba-sidecar-egress
  namespace: downloads
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/instance: samba
      app.kubernetes.io/name: samba
  egress:
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/instance: vpn-gateway
            app.kubernetes.io/name: pod-gateway
      toPorts:
        - ports:
            - port: "51820"
              protocol: UDP
        - ports:
            - port: "67"
              protocol: UDP
            - port: "68"
              protocol: UDP
