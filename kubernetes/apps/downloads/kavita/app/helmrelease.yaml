---
# yaml-language-server: $schema=https://raw.githubusercontent.com/bjw-s-labs/helm-charts/main/charts/other/app-template/schemas/helmrelease-helm-v2.schema.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kavita
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: kavta
  values:
    controllers:
      kavita:
        pod:
          annotations:
            setGateway: "false"
            reloader.stakater.com/auto: "true"
        containers:
          app:
            image:
              repository: ghcr.io/kareadita/kavita
              tag: 0.9.0@sha256:36aab0c578d488f8b10bd33910953b50965aff9ac6adc476ef4692c38c60427e
            env:
              TZ: Europe/london
            resources:
              requests:
                cpu: 15m
                memory: 300Mi
              limits:
                memory: 1Gi
    service:
      app:
        controller: kavita
        ports:
          http:
            port: 5000
    route:
      app:
        hostnames: ["{{ .Release.Name }}.musai.ovh"]
        parentRefs:
          - name: envoy-internal
            namespace: network
    persistence:
      config:
        existingClaim: "${APP_NAME}"
        globalMounts:
          - path: /kavita/config
      media:
        enabled: true
        existingClaim: nfs-manga
        globalMounts:
          - path: /data
            subPath: Literature
