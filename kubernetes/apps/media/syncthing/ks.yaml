---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: &app syncthing
  namespace: &namespace media
spec:
  commonMetadata:
    labels:
      app.kubernetes.io/name: *app
  #components:
  #  - ../../../../components/volsync
  dependsOn:
    - name: linstor
      namespace: flux-system
  interval: 30m
  path: ./kubernetes/apps/media/syncthing/app
  postBuild:
    substitute:
      APP_NAME: syncthing
      VOLSYNC_CAPACITY: 200Gi
      VOLSYNC_COPYMETHOD: Direct
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: *namespace
  timeout: 5m
  wait: false