---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: pvc-access
  namespace: downloads
rules:
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: komga-pvc-access
  namespace: downloads
subjects:
  - kind: ServiceAccount
    name: komga-sa
    namespace: readers
roleRef:
  kind: Role
  name: pvc-access
  apiGroup: rbac.authorization.k8s.io
