[env]
KUBECONFIG = "{{config_root}}/kubeconfig"
SOPS_CONFIG = "{{config_root}}/.sops.yaml"
SOPS_AGE_KEY_FILE = "{{config_root}}/age.key"
TALOSCONFIG = "{{config_root}}/talos/clusterconfig/talosconfig"
JUST_UNSTABLE = "1"

[tools]
age = "1.3.1"
cloudflared = "2026.6.1"
flux2 = "2.8.8"
gh = "2.95.0"
gum = "0.17.0"
helm = "4.2.2"
helmfile = "1.6.0"
jq = "1.8.2"
just = "1.54.0"
kubeconform = "0.8.0"
kubectl = "1.36.2"
kustomize = "5.8.1"
lefthook = "2.1.9"
node = "26.3.1"
oxfmt = "0.56.0"
sops = "3.13.1"
talhelper = "3.1.12"
talosctl = "1.13.5"
yq = "4.53.3"
zizmor = "1.26.1"

[hooks]
postinstall = "lefthook install"
