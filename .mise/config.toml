[env]
KUBECONFIG = "{{config_root}}/kubeconfig"
SOPS_CONFIG = "{{config_root}}/.sops.yaml"
SOPS_AGE_KEY_FILE = "{{config_root}}/age.key"
TALOSCONFIG = "{{config_root}}/talos/clusterconfig/talosconfig"
JUST_UNSTABLE = "1"

[tools]
age = "1.3.1"
cloudflared = "2026.7.1"
flux2 = "2.9.1"
gh = "2.96.0"
gum = "0.17.0"
helm = "4.2.3"
helmfile = "1.7.0"
jq = "1.8.2"
just = "1.56.0"
kubeconform = "0.8.0"
kubectl = "1.36.2"
kustomize = "5.8.1"
lefthook = "2.1.10"
node = "26.4.0"
oxfmt = "0.57.0"
sops = "3.13.2"
talhelper = "3.1.13"
talosctl = "1.13.6"
yq = "4.53.3"
zizmor = "1.26.1"

[hooks]
postinstall = "lefthook install"
